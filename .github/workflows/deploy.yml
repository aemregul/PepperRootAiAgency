name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ============== CI CHECK (önce testler geçmeli) ==============
  ci-check:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    steps:
      - name: CI workflows must pass first
        run: echo "✅ Deploy triggered — CI checks should have passed on PR"

  # ============== BACKEND DEPLOY (Railway) ==============
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up --detach
          echo "✅ Backend deployed to Railway"

  # ============== FRONTEND DEPLOY (Vercel) ==============
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd frontend
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd frontend
          vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd frontend
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          echo "✅ Frontend deployed to Vercel"

  # ============== POST-DEPLOY ==============
  post-deploy:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Backend health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pepperrootaiagency-production.up.railway.app/api/health || true)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Backend healthy (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Backend returned HTTP $HTTP_STATUS — check Railway logs"
          fi

      - name: Frontend health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pepper-root-ai-agency.vercel.app || true)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Frontend healthy (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Frontend returned HTTP $HTTP_STATUS — check Vercel logs"
          fi
